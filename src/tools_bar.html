<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: blob:; media-src 'self' file:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'">
<title>Tools</title>
<style>
  /* Frameless thin bar — minimal chrome, every pixel counts. */
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    /* Transparent body — only the .bar and .dropdown elements get their
       own backgrounds. Without this, when the bar window grows upward to
       host the dropdown, the empty area between the bar and the top of
       the window paints as a dark slab over the canvas. */
    background: transparent;
    color: #f3f3f3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  /* The whole layout: an absolute-positioned bar pinned to the bottom, a
     dropdown that's anchored to the search input (not the full bar). The
     bar's window grows upward (handled in main process) when the dropdown
     opens; the dropdown itself only spans the search input's width.
     Splitting like this keeps the visual focus narrow and prevents
     clicking elsewhere on the bar from doing anything. */
  .root { position: relative; height: 100%; width: 100%; }
  .dropdown {
    /* Anchored to the search input, NOT the full bar — JS positions it
       inline using the input's bounding box. Width matches the input so
       the visual mass is contained. */
    position: absolute;
    background: rgba(12, 12, 18, 0.96);
    border: 1px solid rgba(125, 77, 255, 0.32);
    border-radius: 8px 8px 0 0;
    box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    display: none;
    flex-direction: column;
  }
  .dropdown.open { display: flex; }
  .dropdown__list {
    overflow-y: auto;
    /* Fixed cap to ~5 result rows so the dropdown stays compact. Each
       item is ~30 px so 160 px ≈ 5 rows. */
    max-height: 160px;
  }
  .dropdown__empty {
    padding: 14px 18px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
  }
  .dropdown__item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }
  .dropdown__item:last-child { border-bottom: none; }
  .dropdown__item:hover,
  .dropdown__item.active {
    background: rgba(125, 77, 255, 0.18);
  }
  .dropdown__name { color: #f3f3f3; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dropdown__set {
    color: rgba(255, 255, 255, 0.45);
    font-size: 11px;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 110px;
    flex-shrink: 0;
  }
  .dropdown__hint {
    padding: 5px 14px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.35);
    background: rgba(255, 255, 255, 0.02);
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    display: flex;
    justify-content: space-between;
  }

  .bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    /* Background lives here, not on body, so the area above the bar (used
       as a host surface for the dropdown) stays transparent. */
    background: rgba(15, 15, 22, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    -webkit-app-region: drag; /* drag the bar by its background */
  }
  .bar__brand {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-right: 8px;
    font-weight: 600;
  }
  .bar__divider {
    width: 1px;
    height: 22px;
    background: rgba(255, 255, 255, 0.08);
    margin: 0 4px;
  }
  .bar__spacer { flex: 1; }
  .tool-btn {
    -webkit-app-region: no-drag;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    background: rgba(255, 255, 255, 0.04);
    color: #f3f3f3;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 7px;
    font: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease, transform 0.08s ease;
    white-space: nowrap;
  }
  .tool-btn:hover {
    background: rgba(125, 77, 255, 0.18);
    border-color: rgba(125, 77, 255, 0.45);
  }
  .tool-btn:active { transform: scale(0.97); }
  .tool-btn[disabled] { opacity: 0.4; cursor: not-allowed; }
  .tool-btn__emoji { font-size: 14px; line-height: 1; }

  /* Action search input lives inside the bar. The wrapper is `no-drag` so
     the user can click into the field; the bar background stays draggable. */
  .search {
    -webkit-app-region: no-drag;
    flex: 0 1 320px;
    min-width: 200px;
    position: relative;
    display: flex;
    align-items: center;
  }
  .search__icon {
    position: absolute;
    left: 10px;
    color: rgba(255, 255, 255, 0.45);
    font-size: 12px;
    pointer-events: none;
  }
  .search__input {
    width: 100%;
    height: 30px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 7px;
    color: #f3f3f3;
    font: inherit;
    font-size: 12px;
    padding: 0 32px 0 30px;
    outline: none;
    transition: border-color 0.12s ease, background 0.12s ease;
  }
  .search__input:focus {
    border-color: rgba(125, 77, 255, 0.55);
    background: rgba(255, 255, 255, 0.06);
  }
  .search__input::placeholder { color: rgba(255, 255, 255, 0.4); }
  .search__kbd {
    position: absolute;
    right: 8px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.06);
    padding: 1px 6px;
    border-radius: 4px;
    pointer-events: none;
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .search__refresh {
    -webkit-app-region: no-drag;
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.4);
    font-size: 13px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    margin-left: 4px;
  }
  .search__refresh:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }

  .bar__close {
    -webkit-app-region: no-drag;
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.4);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .bar__close:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }

  .toast {
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="root">
  <!-- Dropdown — JS positions it above the search input. -->
  <div class="dropdown" id="dropdown" role="listbox" aria-label="Photoshop actions">
    <div class="dropdown__list" id="dropdownList"></div>
    <div class="dropdown__hint" id="dropdownHint" style="display:none;"></div>
  </div>

  <!-- The bar itself sits at the bottom, fixed at 44 px. -->
  <div class="bar">
    <span class="bar__brand">Album Studio · Tools</span>
    <div class="bar__divider"></div>

    <button class="tool-btn" id="btnSwapImages" title="Swap the contents of two selected clipped images in the active Photoshop document">
      <span class="tool-btn__emoji">🔄</span><span>Swap 2 Images</span>
    </button>

    <button class="tool-btn" id="btnExportOpen" title="Export the ACTIVE Photoshop document to JPEG (High-Res quality 12 + Low-Res quality 1), replacing the matching files in its JPEG-High-Res / JPEG-Low-Res folders. The doc stays open.">
      <span class="tool-btn__emoji">📸</span><span>JPEG Export</span>
    </button>

    <button class="tool-btn" id="btnExportOpenAll" title="Export EVERY open Photoshop document to JPEG (High-Res quality 12 + Low-Res quality 1), replacing the matching files in their JPEG-High-Res / JPEG-Low-Res folders. Docs stay open.">
      <span class="tool-btn__emoji">🗂️</span><span>JPEG Export all</span>
    </button>

    <div class="bar__divider"></div>

    <!-- Action search — keyboard-first, drop-up. -->
    <div class="search">
      <span class="search__icon">🔎</span>
      <input class="search__input" id="actionSearch" type="text" placeholder="Run Photoshop action…" autocomplete="off" spellcheck="false">
      <span class="search__kbd" id="searchKbd">⌘K</span>
    </div>
    <button class="search__refresh" id="btnRefreshActions" title="Re-scan Photoshop's Actions panel (use after editing actions there)">↻</button>

    <div class="bar__spacer"></div>
    <button class="bar__close" id="btnHide" title="Hide bar (reopen from Tools tab)">✕</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="tools_bar_renderer.js"></script>
</body>
</html>
