name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    env:
      # Tests never launch the Electron GUI, so skip the ~100 MB binary download.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Fail the build on known high/critical vulns in production deps.
      # Dev-only tooling vulns don't ship, so they warn via Dependabot instead.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Test (with coverage)
        run: npm run test:coverage

  e2e:
    name: e2e (macOS · boots the app)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Playwright-Electron boot test
        run: npm run test:e2e
